<div id="modal-overlay" onclick="closeForm()"></div>

<div id="form-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">📍 매장 제보하기</div>

  <div class="form-group">
    <label>매장명 *</label>
    <input type="text" id="f-name" placeholder="예) 꼬마세상" />
  </div>

  <div class="form-group">
    <label>주소 *</label>
    <div class="addr-row">
      <input type="text" id="f-addr" placeholder="검색 또는 직접 입력" oninput="selectedPlace=null" />
      <button class="addr-search-btn" onclick="openPlaceSearch()">찾기</button>
    </div>
  </div>

  <div class="form-group">
    <label>품목 *</label>
    <div class="cat-group">
      <div class="cat-pill" data-cat="clothes" onclick="selectCat('clothes')">👗 옷</div>
      <div class="cat-pill" data-cat="shoes"   onclick="selectCat('shoes')">👟 신발</div>
      <div class="cat-pill" data-cat="goods"   onclick="selectCat('goods')">🎒 잡화</div>
      <div class="cat-pill" data-cat="snack"   onclick="selectCat('snack')">🍪 간식</div>
    </div>
  </div>

  <div class="form-group">
    <label>영업시간 <span class="label-optional">(선택)</span></label>
    <div class="hours-row">
      <div class="hours-item">
        <span class="hours-label">오픈</span>
        <input type="time" id="f-open" />
      </div>
      <span class="hours-dash">~</span>
      <div class="hours-item">
        <span class="hours-label">마감</span>
        <input type="time" id="f-close" />
      </div>
      <button class="hours-clear-btn" onclick="clearHours()">지우기</button>
    </div>
  </div>

  <div class="form-group">
    <label>메모 <span class="label-optional">(선택)</span></label>
    <textarea id="f-memo" placeholder="특이사항 등 자유롭게 적어주세요"></textarea>
  </div>

  <div class="form-group">
    <label>해시태그 <span class="label-optional">(선택)</span></label>

    <!-- 추천 태그 -->
    <div class="hashtag-suggestions">
      <span class="hashtag-suggest-pill" data-tag="딸맘취향저격" onclick="togglePresetTag('딸맘취향저격')">#딸맘취향저격</span>
      <span class="hashtag-suggest-pill" data-tag="아들맘픽"     onclick="togglePresetTag('아들맘픽')">#아들맘픽</span>
      <span class="hashtag-suggest-pill" data-tag="힙합룩"       onclick="togglePresetTag('힙합룩')">#힙합룩</span>
      <span class="hashtag-suggest-pill" data-tag="꾸안꾸"       onclick="togglePresetTag('꾸안꾸')">#꾸안꾸</span>
      <span class="hashtag-suggest-pill" data-tag="신생아용"     onclick="togglePresetTag('신생아용')">#신생아용</span>
      <span class="hashtag-suggest-pill" data-tag="도매가능"     onclick="togglePresetTag('도매가능')">#도매가능</span>
      <span class="hashtag-suggest-pill" data-tag="수입브랜드"   onclick="togglePresetTag('수입브랜드')">#수입브랜드</span>
      <span class="hashtag-suggest-pill" data-tag="시즌특가"     onclick="togglePresetTag('시즌특가')">#시즌특가</span>
    </div>

    <!-- 직접 입력 -->
    <div class="hashtag-input-row">
      <span class="hashtag-hash-prefix">#</span>
      <input
        type="text" id="f-tag-input"
        class="hashtag-input"
        placeholder="직접 입력 후 엔터"
        onkeydown="onTagKeydown(event)"
      />
    </div>

    <!-- 선택된 태그 -->
    <div class="hashtag-selected" id="hashtag-selected"></div>
  </div>

  <div class="form-group">
    <label>사진 <span class="label-optional">(선택 · 최대 3장)</span></label>
    <div class="photo-upload-area" id="photo-upload-area" onclick="document.getElementById('f-photos').click()">
      <span class="photo-upload-icon">📷</span>
      <span class="photo-upload-text">사진을 추가해주세요</span>
    </div>
    <input type="file" id="f-photos" accept="image/*" multiple style="display:none" onchange="onPhotoSelected(this)" />
    <div class="photo-preview-list" id="photo-preview-list"></div>
  </div>

  <button class="submit-btn" onclick="submitStore()">지도에 핀 등록하기 📌</button>
</div>
