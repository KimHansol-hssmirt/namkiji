<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>남키지 — 남대문 키즈 지도</title>
  <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=YOUR_KAKAO_API_KEY&libraries=services"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #FF6B9D;
      --primary-dark: #e85d8e;
      --secondary: #FFD93D;
      --mint: #6BCB77;
      --sky: #4D96FF;
      --bg: #FFF9FC;
      --text: #2D2D2D;
      --muted: #888;
      --radius: 16px;
      --shadow: 0 4px 24px rgba(0,0,0,0.12);
    }

    html, body {
      height: 100%;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ─── Header ─── */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #fff;
      box-shadow: 0 2px 12px rgba(255,107,157,0.15);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .logo-icon {
      width: 36px; height: 36px;
      background: var(--primary);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .logo-text {
      display: flex; flex-direction: column; line-height: 1.1;
    }
    .logo-text .main { font-size: 17px; font-weight: 800; color: var(--primary); }
    .logo-text .sub  { font-size: 10px; color: var(--muted); letter-spacing: 0.5px; }

    #admin-btn {
      padding: 6px 12px;
      border: 1.5px solid #ddd;
      border-radius: 20px;
      font-size: 12px;
      background: #fff;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    #admin-btn.active {
      border-color: var(--primary);
      color: var(--primary);
      background: #fff0f6;
    }

    /* ─── Map ─── */
    #map {
      position: fixed;
      top: 60px; bottom: 0; left: 0; right: 0;
    }

    /* ─── Legend ─── */
    #legend {
      position: fixed;
      top: 72px; left: 12px;
      z-index: 50;
      background: #fff;
      border-radius: 12px;
      padding: 8px 12px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .legend-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--text);
    }
    .legend-dot {
      width: 12px; height: 12px; border-radius: 50%;
      flex-shrink: 0;
    }

    /* ─── FAB ─── */
    #fab {
      position: fixed;
      bottom: 28px; right: 20px;
      z-index: 100;
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      border: none;
      font-size: 26px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(255,107,157,0.45);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s, background 0.2s;
    }
    #fab:active { transform: scale(0.93); }

    /* ─── Store count badge ─── */
    #store-count {
      position: fixed;
      bottom: 28px; left: 20px;
      z-index: 100;
      background: #fff;
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
      box-shadow: var(--shadow);
    }

    /* ─── Modal Overlay ─── */
    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    #modal-overlay.show { opacity: 1; pointer-events: all; }

    /* ─── Bottom Sheet (form) ─── */
    #form-sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 201;
      background: #fff;
      border-radius: 24px 24px 0 0;
      padding: 0 20px 32px;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 90vh;
      overflow-y: auto;
    }
    #form-sheet.show { transform: translateY(0); }

    .sheet-handle {
      width: 36px; height: 4px;
      background: #ddd; border-radius: 2px;
      margin: 12px auto 20px;
    }

    .sheet-title {
      font-size: 18px; font-weight: 800;
      color: var(--text);
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 13px; font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #eee;
      border-radius: 12px;
      font-size: 15px;
      font-family: inherit;
      background: #fafafa;
      color: var(--text);
      transition: border-color 0.2s;
      outline: none;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--primary);
      background: #fff;
    }
    .form-group textarea { resize: none; height: 80px; }

    /* Category pills */
    .cat-group {
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .cat-pill {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1.5px solid #eee;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      background: #fafafa;
    }
    .cat-pill.selected-clothes  { border-color: var(--primary);  background: #fff0f6; color: var(--primary); }
    .cat-pill.selected-shoes    { border-color: var(--sky);      background: #f0f6ff; color: var(--sky); }
    .cat-pill.selected-goods    { border-color: var(--mint);     background: #f0fff3; color: var(--mint); }

    .submit-btn {
      width: 100%; padding: 16px;
      background: var(--primary);
      color: #fff; border: none;
      border-radius: 14px;
      font-size: 16px; font-weight: 800;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .submit-btn:active { background: var(--primary-dark); }

    /* ─── Custom Map Overlay ─── */
    .map-pin {
      display: flex; flex-direction: column; align-items: center;
      cursor: pointer;
    }
    .pin-bubble {
      padding: 6px 10px;
      border-radius: 10px;
      font-size: 12px; font-weight: 700;
      color: #fff;
      white-space: nowrap;
      box-shadow: 0 3px 10px rgba(0,0,0,0.2);
      max-width: 100px;
      overflow: hidden;
      text-overflow: ellipsis;
      position: relative;
    }
    .pin-bubble::after {
      content: '';
      position: absolute;
      bottom: -6px; left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-bottom: none;
    }
    .pin-bubble.clothes { background: var(--primary); }
    .pin-bubble.clothes::after { border-top-color: var(--primary); }
    .pin-bubble.shoes   { background: var(--sky); }
    .pin-bubble.shoes::after   { border-top-color: var(--sky); }
    .pin-bubble.goods   { background: var(--mint); }
    .pin-bubble.goods::after   { border-top-color: var(--mint); }

    /* ─── Info popup ─── */
    #info-popup {
      position: fixed;
      bottom: 90px; left: 16px; right: 16px;
      z-index: 150;
      background: #fff;
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      display: none;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .popup-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 8px;
    }
    .popup-name { font-size: 16px; font-weight: 800; }
    .popup-close {
      background: none; border: none; font-size: 20px;
      color: var(--muted); cursor: pointer; padding: 0 0 0 8px;
    }

    .popup-tag {
      display: inline-block;
      padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700; color: #fff;
      margin-bottom: 8px;
    }
    .popup-tag.clothes { background: var(--primary); }
    .popup-tag.shoes   { background: var(--sky); }
    .popup-tag.goods   { background: var(--mint); }

    .popup-addr { font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    .popup-memo { font-size: 13px; color: var(--text); }

    .popup-delete {
      display: none;
      width: 100%; margin-top: 12px; padding: 10px;
      background: #fff2f2; color: #e53e3e;
      border: 1.5px solid #feb2b2; border-radius: 10px;
      font-size: 13px; font-weight: 700; cursor: pointer;
    }
    .popup-delete.visible { display: block; }

    /* ─── Toast ─── */
    #toast {
      position: fixed;
      top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px);
      background: #2d2d2d; color: #fff;
      padding: 10px 20px; border-radius: 20px;
      font-size: 13px; font-weight: 600;
      z-index: 999;
      opacity: 0; pointer-events: none;
      transition: all 0.3s;
      white-space: nowrap;
    }
    #toast.show {
      opacity: 1; transform: translateX(-50%) translateY(0);
    }

    /* ─── Admin modal ─── */
    #admin-modal {
      position: fixed; inset: 0;
      z-index: 300;
      display: none;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.5);
    }
    #admin-modal.show { display: flex; }

    .admin-box {
      background: #fff; border-radius: var(--radius);
      padding: 28px 24px; width: 280px;
    }
    .admin-box h3 { font-size: 17px; font-weight: 800; margin-bottom: 16px; }
    .admin-box input {
      width: 100%; padding: 12px;
      border: 1.5px solid #eee; border-radius: 10px;
      font-size: 15px; margin-bottom: 12px; outline: none;
    }
    .admin-box input:focus { border-color: var(--primary); }
    .admin-actions { display: flex; gap: 8px; }
    .admin-actions button {
      flex: 1; padding: 12px; border-radius: 10px; border: none;
      font-size: 14px; font-weight: 700; cursor: pointer;
    }
    .admin-confirm { background: var(--primary); color: #fff; }
    .admin-cancel  { background: #f0f0f0; color: var(--text); }
  </style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div class="logo" id="logo-tap">
    <div class="logo-icon">👶</div>
    <div class="logo-text">
      <span class="main">남키지</span>
      <span class="sub">남대문 키즈 지도</span>
    </div>
  </div>
  <button id="admin-btn" onclick="openAdminModal()">관리자</button>
</div>

<!-- Map -->
<div id="map"></div>

<!-- Legend -->
<div id="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--primary)"></div>옷</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--sky)"></div>신발</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--mint)"></div>잡화</div>
</div>

<!-- Store count -->
<div id="store-count">매장 <span id="count-num">0</span>개</div>

<!-- FAB -->
<button id="fab" onclick="openForm()">＋</button>

<!-- Info popup -->
<div id="info-popup">
  <div class="popup-header">
    <span class="popup-name" id="popup-name"></span>
    <button class="popup-close" onclick="closePopup()">×</button>
  </div>
  <span class="popup-tag" id="popup-tag"></span>
  <div class="popup-addr" id="popup-addr"></div>
  <div class="popup-memo" id="popup-memo"></div>
  <button class="popup-delete" id="popup-delete" onclick="deleteCurrentStore()">이 매장 삭제</button>
</div>

<!-- Modal overlay -->
<div id="modal-overlay" onclick="closeForm()"></div>

<!-- Form bottom sheet -->
<div id="form-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">📍 매장 제보하기</div>

  <div class="form-group">
    <label>매장명 *</label>
    <input type="text" id="f-name" placeholder="예) 꼬마세상" />
  </div>

  <div class="form-group">
    <label>주소 *</label>
    <input type="text" id="f-addr" placeholder="예) 서울 중구 남대문시장길 12" />
  </div>

  <div class="form-group">
    <label>품목 *</label>
    <div class="cat-group">
      <div class="cat-pill" data-cat="clothes" onclick="selectCat('clothes')">👗 옷</div>
      <div class="cat-pill" data-cat="shoes"   onclick="selectCat('shoes')">👟 신발</div>
      <div class="cat-pill" data-cat="goods"   onclick="selectCat('goods')">🎒 잡화</div>
    </div>
  </div>

  <div class="form-group">
    <label>메모</label>
    <textarea id="f-memo" placeholder="영업시간, 특이사항 등 자유롭게 적어주세요"></textarea>
  </div>

  <button class="submit-btn" onclick="submitStore()">지도에 핀 등록하기 📌</button>
</div>

<!-- Admin modal -->
<div id="admin-modal">
  <div class="admin-box">
    <h3>🔐 관리자 로그인</h3>
    <input type="password" id="admin-pw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')confirmAdmin()" />
    <div class="admin-actions">
      <button class="admin-cancel" onclick="closeAdminModal()">취소</button>
      <button class="admin-confirm" onclick="confirmAdmin()">확인</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  // ─── State ───────────────────────────────────────────────────────────────
  const ADMIN_PASSWORD = 'namkiji2024';
  let isAdmin = false;
  let selectedCat = '';
  let currentPopupId = null;
  let map = null;
  let geocoder = null;
  let overlays = {}; // id → { overlay, store }
  let logoTapCount = 0;
  let logoTapTimer = null;

  // ─── Dummy Data ──────────────────────────────────────────────────────────
  const dummyStores = [
    {
      id: 'dummy1',
      name: '꼬마세상',
      addr: '서울 중구 남대문시장4길 21',
      cat: 'clothes',
      memo: '신생아~7세 의류 전문. 도매도 가능.',
      lat: 37.5590, lng: 126.9762
    },
    {
      id: 'dummy2',
      name: '키즈슈즈랜드',
      addr: '서울 중구 남대문시장2길 8',
      cat: 'shoes',
      memo: '수입 아동화 전문. 사이즈 100~190.',
      lat: 37.5602, lng: 126.9775
    },
    {
      id: 'dummy3',
      name: '아가방 남대문점',
      addr: '서울 중구 남대문시장5길 14',
      cat: 'clothes',
      memo: '임부복·신생아 의류. 오전 9시 오픈.',
      lat: 37.5595, lng: 126.9755
    },
    {
      id: 'dummy4',
      name: '베베잡화관',
      addr: '서울 중구 남대문시장3길 33',
      cat: 'goods',
      memo: '가방, 모자, 양말 등 아동 잡화 총집합.',
      lat: 37.5608, lng: 126.9768
    },
    {
      id: 'dummy5',
      name: '리틀스타 의류',
      addr: '서울 중구 남대문시장길 19',
      cat: 'clothes',
      memo: '계절별 의류 최저가. 단체주문 환영.',
      lat: 37.5583, lng: 126.9780
    },
  ];

  // ─── Storage ─────────────────────────────────────────────────────────────
  function loadStores() {
    try {
      const saved = localStorage.getItem('namkiji_stores');
      return saved ? JSON.parse(saved) : [];
    } catch { return []; }
  }

  function saveStores(list) {
    localStorage.setItem('namkiji_stores', JSON.stringify(list));
  }

  function getAllStores() {
    const user = loadStores();
    return [...dummyStores, ...user];
  }

  // ─── Map Init ─────────────────────────────────────────────────────────────
  function initMap() {
    const container = document.getElementById('map');
    const options = {
      center: new kakao.maps.LatLng(37.5597, 126.9769),
      level: 4
    };
    map = new kakao.maps.Map(container, options);
    geocoder = new kakao.maps.services.Geocoder();

    // Load all stores
    getAllStores().forEach(s => addPinToMap(s));
    updateCount();
  }

  // ─── Pin ──────────────────────────────────────────────────────────────────
  const catLabel = { clothes: '옷', shoes: '신발', goods: '잡화' };

  function makePinHTML(store) {
    return `
      <div class="map-pin" onclick="showPopup('${store.id}')">
        <div class="pin-bubble ${store.cat}">${store.name}</div>
      </div>`;
  }

  function addPinToMap(store) {
    const pos = new kakao.maps.LatLng(store.lat, store.lng);
    const content = makePinHTML(store);
    const overlay = new kakao.maps.CustomOverlay({
      position: pos,
      content: content,
      yAnchor: 1.3,
    });
    overlay.setMap(map);
    overlays[store.id] = { overlay, store };
  }

  function removePinFromMap(id) {
    if (overlays[id]) {
      overlays[id].overlay.setMap(null);
      delete overlays[id];
    }
  }

  function updateCount() {
    document.getElementById('count-num').textContent = Object.keys(overlays).length;
  }

  // ─── Form ─────────────────────────────────────────────────────────────────
  function openForm() {
    document.getElementById('modal-overlay').classList.add('show');
    document.getElementById('form-sheet').classList.add('show');
  }

  function closeForm() {
    document.getElementById('modal-overlay').classList.remove('show');
    document.getElementById('form-sheet').classList.remove('show');
  }

  function selectCat(cat) {
    selectedCat = cat;
    document.querySelectorAll('.cat-pill').forEach(el => {
      el.className = 'cat-pill';
      if (el.dataset.cat === cat) el.classList.add(`selected-${cat}`);
    });
  }

  function submitStore() {
    const name = document.getElementById('f-name').value.trim();
    const addr = document.getElementById('f-addr').value.trim();
    const memo = document.getElementById('f-memo').value.trim();

    if (!name) { showToast('매장명을 입력해주세요'); return; }
    if (!addr) { showToast('주소를 입력해주세요'); return; }
    if (!selectedCat) { showToast('품목을 선택해주세요'); return; }

    showToast('주소 검색 중...');

    geocoder.addressSearch(addr, function(result, status) {
      if (status === kakao.maps.services.Status.OK) {
        const lat = parseFloat(result[0].y);
        const lng = parseFloat(result[0].x);
        const store = {
          id: 'user_' + Date.now(),
          name, addr, cat: selectedCat, memo, lat, lng
        };

        const userStores = loadStores();
        userStores.push(store);
        saveStores(userStores);

        addPinToMap(store);
        updateCount();

        map.panTo(new kakao.maps.LatLng(lat, lng));
        closeForm();
        resetForm();
        showToast('📌 지도에 등록됐어요!');
      } else {
        showToast('주소를 찾을 수 없어요. 다시 확인해주세요.');
      }
    });
  }

  function resetForm() {
    document.getElementById('f-name').value = '';
    document.getElementById('f-addr').value = '';
    document.getElementById('f-memo').value = '';
    selectedCat = '';
    document.querySelectorAll('.cat-pill').forEach(el => el.className = 'cat-pill');
  }

  // ─── Popup ────────────────────────────────────────────────────────────────
  function showPopup(id) {
    const entry = overlays[id];
    if (!entry) return;
    const s = entry.store;
    currentPopupId = id;

    document.getElementById('popup-name').textContent = s.name;

    const tagEl = document.getElementById('popup-tag');
    tagEl.textContent = catLabel[s.cat] || s.cat;
    tagEl.className = `popup-tag ${s.cat}`;

    document.getElementById('popup-addr').textContent = '📍 ' + s.addr;
    document.getElementById('popup-memo').textContent = s.memo ? '💬 ' + s.memo : '';

    const delBtn = document.getElementById('popup-delete');
    delBtn.classList.toggle('visible', isAdmin);

    document.getElementById('info-popup').style.display = 'block';
  }

  function closePopup() {
    document.getElementById('info-popup').style.display = 'none';
    currentPopupId = null;
  }

  function deleteCurrentStore() {
    if (!currentPopupId || !isAdmin) return;
    const id = currentPopupId;
    const isDummy = dummyStores.some(s => s.id === id);
    if (isDummy) {
      showToast('기본 데이터는 삭제할 수 없어요');
      return;
    }
    const userStores = loadStores().filter(s => s.id !== id);
    saveStores(userStores);
    removePinFromMap(id);
    updateCount();
    closePopup();
    showToast('삭제됐어요');
  }

  // ─── Admin ────────────────────────────────────────────────────────────────
  function openAdminModal() {
    if (isAdmin) {
      isAdmin = false;
      document.getElementById('admin-btn').classList.remove('active');
      document.getElementById('admin-btn').textContent = '관리자';
      if (currentPopupId) {
        document.getElementById('popup-delete').classList.remove('visible');
      }
      showToast('관리자 모드 해제');
      return;
    }
    document.getElementById('admin-pw').value = '';
    document.getElementById('admin-modal').classList.add('show');
    setTimeout(() => document.getElementById('admin-pw').focus(), 100);
  }

  function closeAdminModal() {
    document.getElementById('admin-modal').classList.remove('show');
  }

  function confirmAdmin() {
    const pw = document.getElementById('admin-pw').value;
    if (pw === ADMIN_PASSWORD) {
      isAdmin = true;
      closeAdminModal();
      document.getElementById('admin-btn').classList.add('active');
      document.getElementById('admin-btn').textContent = '관리자 ✓';
      showToast('🔓 관리자 모드 활성화');
    } else {
      showToast('비밀번호가 틀렸어요');
      document.getElementById('admin-pw').value = '';
      document.getElementById('admin-pw').focus();
    }
  }

  // ─── Toast ────────────────────────────────────────────────────────────────
  let toastTimer = null;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }

  // ─── Map load ─────────────────────────────────────────────────────────────
  // Wait for Kakao SDK to be ready
  function tryInit() {
    if (typeof kakao !== 'undefined' && kakao.maps) {
      kakao.maps.load(initMap);
    } else {
      setTimeout(tryInit, 100);
    }
  }

  window.addEventListener('load', tryInit);

  // Close popup on map click (via event delegation since Kakao map captures events)
  document.getElementById('map').addEventListener('click', function(e) {
    if (!e.target.closest('.map-pin') && !e.target.closest('#info-popup')) {
      closePopup();
    }
  });
</script>
</body>
</html>
