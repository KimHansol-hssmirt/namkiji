<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>남키지 — 남대문 키즈 지도</title>
  <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=00e3c22df1cf79a08b42f674ba278f01&libraries=services&autoload=false"></script>
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

<!-- Header -->
<div id="header">
  <div class="logo" id="logo-tap">
    <div class="logo-icon">👶</div>
    <div class="logo-text">
      <span class="main">남키지</span>
      <span class="sub">남대문 키즈 지도</span>
    </div>
  </div>
  <button id="admin-btn" onclick="openAdminModal()">관리자</button>
</div>

<!-- Map -->
<div id="map"></div>

<!-- Legend -->
<div id="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--primary)"></div>옷</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--sky)"></div>신발</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--mint)"></div>잡화</div>
</div>

<!-- Store count -->
<div id="store-count">매장 <span id="count-num">0</span>개</div>

<!-- FAB -->
<button id="fab" onclick="openForm()">＋</button>

<!-- Info popup -->
<div id="info-popup">
  <div class="popup-header">
    <span class="popup-name" id="popup-name"></span>
    <button class="popup-close" onclick="closePopup()">×</button>
  </div>
  <span class="popup-tag" id="popup-tag"></span>
  <div class="popup-addr" id="popup-addr"></div>
  <div class="popup-memo" id="popup-memo"></div>
  <button class="popup-delete" id="popup-delete" onclick="deleteCurrentStore()">이 매장 삭제</button>
</div>

<!-- Modal overlay -->
<div id="modal-overlay" onclick="closeForm()"></div>

<!-- Form bottom sheet -->
<div id="form-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">📍 매장 제보하기</div>

  <div class="form-group">
    <label>매장명 *</label>
    <input type="text" id="f-name" placeholder="예) 꼬마세상" />
  </div>

  <div class="form-group">
    <label>주소 *</label>
    <input type="text" id="f-addr" placeholder="예) 서울 중구 남대문시장길 12" />
  </div>

  <div class="form-group">
    <label>품목 *</label>
    <div class="cat-group">
      <div class="cat-pill" data-cat="clothes" onclick="selectCat('clothes')">👗 옷</div>
      <div class="cat-pill" data-cat="shoes"   onclick="selectCat('shoes')">👟 신발</div>
      <div class="cat-pill" data-cat="goods"   onclick="selectCat('goods')">🎒 잡화</div>
    </div>
  </div>

  <div class="form-group">
    <label>메모</label>
    <textarea id="f-memo" placeholder="영업시간, 특이사항 등 자유롭게 적어주세요"></textarea>
  </div>

  <button class="submit-btn" onclick="submitStore()">지도에 핀 등록하기 📌</button>
</div>

<!-- Admin modal -->
<div id="admin-modal">
  <div class="admin-box">
    <h3>🔐 관리자 로그인</h3>
    <input type="password" id="admin-pw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')confirmAdmin()" />
    <div class="admin-actions">
      <button class="admin-cancel" onclick="closeAdminModal()">취소</button>
      <button class="admin-confirm" onclick="confirmAdmin()">확인</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script src="js/common.js"></script>
<script src="js/main.js"></script>
<script src="js/components.js"></script>
</body>
</html>
